springdoc:
  swagger-ui:
    path: /swagger-ui.html # 👉 OpenAPI JSON 문서 경로 (기본: /api-docs)
  api-docs:
    path: /api-docs  # 👉 Swagger UI 접속 경로 (기본: /swagger-ui/index.html)

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/giant
    username: postgres
    password: # Set your DB password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        highlight_sql: true
        type: trace

jwt:
  access:
    secret: # Set your secret key
    expiration: 30m
  refresh:
    secret: # Set your secret key
    expiration: 14d

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace